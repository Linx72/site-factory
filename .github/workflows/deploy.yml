name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: QA
        run: npm run qa

      - name: Production build (storefront)
        run: npm run build
        env:
          NEXT_PUBLIC_I18N: "false"
          NEXT_PUBLIC_DEFAULT_LOCALE: "ru"
          NEXT_PUBLIC_SITE_URL: "https://site-factory-hq.vercel.app"
          NEXT_PUBLIC_CONTACT_EMAIL: "brief@sitefactory.dev"
          NEXT_PUBLIC_ANALYTICS: "vercel"

      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Pin storefront NEXT_PUBLIC_* for prebuilt build
        run: |
          ENV_FILE=".vercel/.env.production.local"
          touch "$ENV_FILE"
          for kv in \
            "NEXT_PUBLIC_I18N=false" \
            "NEXT_PUBLIC_DEFAULT_LOCALE=ru" \
            "NEXT_PUBLIC_SITE_URL=https://site-factory-hq.vercel.app" \
            "NEXT_PUBLIC_ANALYTICS=vercel" \
            "NEXT_PUBLIC_CONTACT_EMAIL=brief@sitefactory.dev"; do
            key="${kv%%=*}"
            if grep -q "^${key}=" "$ENV_FILE"; then
              sed -i "s|^${key}=.*|${kv}|" "$ENV_FILE"
            else
              echo "$kv" >>"$ENV_FILE"
            fi
          done

      - name: Build with Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_I18N: "false"
          NEXT_PUBLIC_DEFAULT_LOCALE: "ru"
          NEXT_PUBLIC_SITE_URL: "https://site-factory-hq.vercel.app"

      - name: Deploy prebuilt
        id: deploy
        run: |
          set -euo pipefail
          OUT=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$OUT"
          URL=$(echo "$OUT" | grep -Eo 'https://site-factory-[a-z0-9]+-fly-type\.vercel\.app' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Alias site-factory-hq
        run: |
          npx vercel alias set "${{ steps.deploy.outputs.url }}" site-factory-hq.vercel.app \
            --token=${{ secrets.VERCEL_TOKEN }}
          bash scripts/verify-alias.sh "${{ steps.deploy.outputs.url }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Storefront prod smoke
        run: npm run verify:storefront
        env:
          VERIFY_PROD_RETRIES: "8"
          VERIFY_PROD_RETRY_DELAY: "8"
