name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint and typecheck
        run: npm run qa

      - name: Production build (storefront)
        run: npm run build
        env:
          NEXT_PUBLIC_I18N: "false"
          NEXT_PUBLIC_DEFAULT_LOCALE: "ru"
          NEXT_PUBLIC_SITE_URL: "https://site-factory-hq.vercel.app"
          NEXT_PUBLIC_CONTACT_EMAIL: "brief@sitefactory.dev"
          NEXT_PUBLIC_ANALYTICS: "vercel"

      - name: Sitemap smoke
        run: npm run verify:sitemap
        env:
          NEXT_PUBLIC_I18N: "false"
          NEXT_PUBLIC_DEFAULT_LOCALE: "ru"
          NEXT_PUBLIC_SITE_URL: "https://site-factory-hq.vercel.app"

  prod-smoke:
    runs-on: ubuntu-latest
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Storefront prod smoke
        run: npm run verify:storefront
