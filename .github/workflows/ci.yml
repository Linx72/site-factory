name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GitHub billing hold can fail the runner in ~4s — Vercel deploy + local verify:all remain the source of truth.

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run qa

      - name: Messages parity (en ↔ ru)
        run: npm run verify:messages

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Visual regression
        run: npm run qa:visual
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_I18N: "true"
          NEXT_PUBLIC_SITE_URL: "https://web-motion-starter.vercel.app"

      - name: Sitemap URL smoke
        run: npm run verify:sitemap
        env:
          NEXT_PUBLIC_I18N: "true"
          NEXT_PUBLIC_SITE_URL: "https://web-motion-starter.vercel.app"

  prod-smoke:
    runs-on: ubuntu-latest
    needs: qa
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Prod i18n + backend smoke
        run: npm run verify:prod && npm run verify:backend

      - name: Prod Stripe smoke (warn-only)
        run: npm run verify:stripe
        continue-on-error: true
        env:
          VERIFY_STRIPE_STRICT: "0"
